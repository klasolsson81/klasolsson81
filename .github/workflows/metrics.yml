name: Metrics
on:
  # Run daily at 00:00 UTC
  schedule: [{cron: "0 0 * * *"}]
  # Run on every push to main
  push: {branches: ["main"]}
  # Allow manual runs from Actions tab
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Isometric 3D contribution calendar
        uses: lowlighter/metrics@latest
        with:
          # Output filename
          filename: metrics.svg

          # Auth — requires a classic PAT in repo secrets named METRICS_TOKEN
          # Fine-grained tokens won't work (GraphQL unsupported)
          token: ${{ secrets.METRICS_TOKEN }}
          user: klasolsson81

          # Commit directly to main branch
          committer_branch: main
          committer_message: "chore(metrics): update"

          # --- Visual config ---
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Stockholm

          # Tokyo Night-ish palette
          config_order: base.header, isocalendar, languages, habits, notable

          # --- The signature piece: isometric 3D commit calendar ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Language breakdown (shows C# prominently, unlike default stats)
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used

          # Coding habits (shows commit hours, craft signals)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Notable contributions (shows ecosystem reach)
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit

          # Output settings
          config_output: auto
          config_display: regular
